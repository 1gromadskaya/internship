version: '3.8'
services:
  airflow:
    image: apache/airflow:2.7.1
    volumes:
      - ./dags:/opt/airflow/dags
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - docker-compose down_PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-snowflake==5.3.1
    ports:
      - "8080:8080"
    command: standalone